<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Aditya 🎉</title>
  <source src="birthday.mp3" type="audio/mpeg">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      overflow: hidden;
    }

    .container {
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 35px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
    }

    /* ✨ Glow Effect */
    h1, h2 {
      text-shadow: 0 0 10px #fff, 0 0 20px yellow;
    }

    /* 🎨 Background Animation */
    body {
      animation: bgChange 8s infinite alternate;
    }

    @keyframes bgChange {
      0% { background: #ff416c; }
      25% { background: #ff4b2b; }
      50% { background: #ff9a9e; }
      75% { background: #fad0c4; }
      100% { background: #fbc2eb; }
    }

    /* 🎈 Balloons */
    .balloon {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 50px;
      background: red;
      border-radius: 50%;
      animation: float 6s infinite;
    }

    .balloon:nth-child(1) { left: 10%; background: yellow; animation-duration: 5s;}
    .balloon:nth-child(2) { left: 30%; background: blue; animation-duration: 7s;}
    .balloon:nth-child(3) { left: 50%; background: green; animation-duration: 6s;}
    .balloon:nth-child(4) { left: 70%; background: pink; animation-duration: 8s;}
    .balloon:nth-child(5) { left: 90%; background: orange; animation-duration: 5s;}

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-110vh); }
    }

    /* Fade */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* 🎵 Button */
    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: black;
      color: white;
    }
  </style>
</head>

<body>

  <!-- 🎈 Balloons -->
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>

  <div class="container">
    <h1>🎂 Happy Birthday 🎂</h1>
    <h2>Aditya 🎉🔥</h2>

    <p>
      Wishing you a day filled with happiness 😄 <br>
      and a year filled with success 🚀 <br><br>
      Bhagwan tumhe hamesha khush rakhe 🙏 <br>
      Har sapna pura ho 💯 <br>
      Enjoy your special day 🥳🔥
    </p>

    <!-- 🎵 Music -->
    <audio id="music" loop>
      <source src="birthday.mp3" type="audio/mpeg">
    </audio>

    <button class="btn" onclick="playMusic()">▶ Play Music</button>
  </div>

  <script>
    function playMusic() {
      document.getElementById("music").play();
    }
  </script>

</body>
</html>
